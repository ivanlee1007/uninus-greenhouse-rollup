name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: npm ci
      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "v$PACKAGE_VERSION"
      - run: uv run --with 'homeassistant==2026.7.2' python -m unittest discover -s tests_python -v
      - run: npm run ci
      - run: python -m compileall -q custom_components
      - run: npm audit --audit-level=high
      - uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            uninus-greenhouse-rollup-card.js \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
