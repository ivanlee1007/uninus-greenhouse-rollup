name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: node --check uninus-greenhouse-rollup-card.js
      - run: git diff --exit-code -- uninus-greenhouse-rollup-card.js
      - run: npm audit --audit-level=high
